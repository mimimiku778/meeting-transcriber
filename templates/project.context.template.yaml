# 案件コンテキスト テンプレート（会議ディレクトリにコピーして埋める）
# 使い方:
#   1) 会議ディレクトリ（動画と同じ場所）に project.context.yaml としてコピー
#   2) フレーム抽出（参加者パネル＋共有資料）を Read で視覚確認し、確定事実だけを記入
#   3) transcribe ... --context <この.yaml> で ASR固有名詞注入＋決定的正規化が効く
#   4) 議事録生成時、Claude はこの組織図/ロスター/帰属ルールに従って owner を確定する
#
# ★鉄則: 組織構造と話者↔会社は「フレーム由来の確定事実」を書く。
#   音声/文字からの推測で埋めない。確証が無い欄は (要確認) と明記する。

meeting:
  title: ""                         # 例: "週次定例MTG"
  kind: ""                          # 例: "社内事前打合せ" / "クライアント定例" / "エンドユーザーレビュー"
  date: ""                          # YYYY-MM-DD
  attendees_present: []             # 出席した会社ID 例: [A社, B社]
  expected_speakers:                # 参加者の実人数（例: 4）。diarizationの過分割を抑制（--speakers 未指定時に使用）

# 登場する会社（自社・クライアント・エンドユーザー…）。idは議事録ownerのenumに使う。
organization:
  - id: ""                          # 短い略号。例: A社
    canonical: ""                   # 正式名。例: "A社（example.com）"
    side: ""                        # 自社 / クライアント / エンドユーザー / パートナー 等
    role: >-
      この会社が会議で担う役割と、宿題のownerになりやすい作業を具体的に。
      例: 設計書の作成・修正・編集を行う実作業側 / レビュー進行・エンドユーザー折衝 / 承認のみ
    asr_aliases: []                 # 文字起こし上の呼ばれ方・誤認識ゆれ 例: ["A社","A社さん"]

# 話者ラベル↔氏名↔会社。フレームのアクティブスピーカー(青枠)と画面共有主から確定する。
speaker_roster:
  - label: "発話者1"
    name: ""                        # 確定できなければ "(要確認)"
    company: ""                     # organization の id
    role: ""

# ASRの initial_prompt に高優先で注入する固有名詞（先頭ほど優先）。
asr_prompt_terms: []

# 用語の正表記と誤認識エイリアス（→ 決定的置換にも使われる）
glossary:
  - term: ""
    aliases: []
    category: term                  # term / product / person / org

# owner解決の事前確率（逐語引用が常に優先。確証なければ UNKNOWN）
attribution_rules:
  - "owner は発話の主語ではなく『実際に作業する会社』。"
  - "主語省略は原則その発話者の所属会社をowner。"
  - "明示的に他社へ依頼している場合のみ依頼先をowner。"
  - "引用からownerが確定できなければ UNKNOWN（推測で会社名を埋めない）。"
  # ここに案件固有の役割→owner規則を追記（例: 設計書修正=A社 / エンドユーザー確認=B社）

normalization:
  # 曖昧さの無い表記ゆれのみ機械置換する。意味反転しうる略号は入れない。
  deterministic:
    - correct: ""
      wrong: []
  # 既知のハルシネーション定型句を transcript から削除（配信の締め挨拶など）
  drop_phrases:
    - "ご視聴ありがとうございました"
    - "ご視聴ありがとうございました。"
  # 額面置換禁止・Claudeが文脈で判定すべき注意点（意味反転・ハルシネーション等）
  context_notes:
    - "略号の意味反転に注意。音/文字からの推測で会社を読み替えない（フレームの確定事実を優先）。"
